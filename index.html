<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
    <title>Begleitinstrument — Stabiler Route-Export</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        html, body, #map { height: 100%; margin: 0; background: #fff; overflow: hidden; }
        #map { width: 100%; height: 100vh; }
        .top-ui { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; gap: 8px; }
        .side-ui { position: fixed; top: 70px; right: 12px; z-index: 1000; width: 180px; display: flex; flex-direction: column; gap: 10px; }
        .bottom-left { position: fixed; bottom: 20px; left: 12px; z-index: 1000; display: flex; flex-direction: column; gap: 12px; }
        .panel { background: white; padding: 12px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: 1px solid #ddd; }
        .btn { padding: 10px 14px; border-radius: 10px; font-weight: bold; font-size: 11px; cursor: pointer; text-transform: uppercase; border: none; }
        .fab { width: 60px; height: 60px; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border: none; box-shadow: 0 6px 12px rgba(0,0,0,0.2); }
        .custom-div-icon { background: none; border: none; }
        .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; color: white; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; }
    </style>
</head>
<body>

<div id="exportLoader" class="loading-overlay">
    <div class="text-xl font-bold mb-2">Export läuft...</div>
    <div id="exportProgress" class="text-sm opacity-80">Route & Karte werden gesichert</div>
</div>

<div id="map"></div>

<div class="top-ui">
    <button id="startWalk" class="btn bg-blue-600 text-white">NEUER WALK</button>
    <button id="stopWalk" class="btn bg-red-600 text-white">BEENDEN</button>
    <button id="exportFull" class="btn bg-black text-white">ZIP EXPORT</button>
</div>

<div class="side-ui">
    <div class="panel">
        <p class="font-bold text-[9px] uppercase text-gray-400 mb-2 border-b">Ebenen</p>
        <div class="flex items-center gap-2 mb-1 text-xs"><input id="toggleTempo" type="checkbox" checked> <label>Route (Schwarz)</label></div>
        <div class="flex items-center gap-2 mb-1 text-xs"><input id="togglePhoto" type="checkbox" checked> <label>Fotos</label></div>
        <div class="flex items-center gap-2 mb-1 text-xs"><input id="toggleAudio" type="checkbox" checked> <label>Audio</label></div>
    </div>
    <div class="panel max-h-[150px] overflow-y-auto">
        <p class="font-bold text-[9px] uppercase text-gray-400 border-b mb-1">Archiv</p>
        <div id="walkList"></div>
    </div>
</div>

<div class="bottom-left">
    <button id="photoBtn" class="fab bg-white">📸</button>
    <button id="audioToggle" class="fab bg-orange-400 text-white">▶️</button>
    <button id="senseBtn" class="fab bg-[#3d633d] text-white">👁️</button>
    <button id="thoughtBtn" class="fab bg-[#12345f] text-white">💭</button>
    <button id="moodBtn" class="fab" style="background: radial-gradient(circle, #ff8c00, #ff4500);">🔋</button>
</div>

<script>
const state = {
    walks: JSON.parse(localStorage.getItem('savedWalks') || '[]'),
    current: JSON.parse(localStorage.getItem('currentWalk') || 'null'),
    map: null,
    isRecording: false,
    layers: { tempo: L.layerGroup(), photo: L.layerGroup(), audio: L.layerGroup(), mood: L.layerGroup(), sense: L.layerGroup(), thought: L.layerGroup() }
};

let liveMarker = null;

function saveToDisk() {
    localStorage.setItem('currentWalk', JSON.stringify(state.current));
    localStorage.setItem('savedWalks', JSON.stringify(state.walks));
}

function initMap() {
    state.map = L.map('map', { zoomControl: false, preferCanvas: true }).setView([47.23, 9.61], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
        crossOrigin: true,
        attribution: '© OpenStreetMap'
    }).addTo(state.map);
    
    Object.values(state.layers).forEach(l => l.addTo(state.map));
    
    if (state.current) { renderRoute(); state.current.entries.forEach(drawMarker); }
    updateArchiveUI();

    navigator.geolocation.watchPosition(pos => {
        const { latitude, longitude } = pos.coords;
        if (!liveMarker) {
            liveMarker = L.circleMarker([latitude, longitude], { radius: 8, fillColor: "#2563eb", color: "#fff", weight: 2, fillOpacity: 1 }).addTo(state.map);
            state.map.panTo([latitude, longitude]);
        } else {
            liveMarker.setLatLng([latitude, longitude]);
        }
        if (state.current) {
            state.current.route.push([latitude, longitude]);
            renderRoute();
            saveToDisk();
        }
    }, null, { enableHighAccuracy: true });
}

function renderRoute() {
    state.layers.tempo.clearLayers();
    if (state.current && state.current.route.length >= 2) {
        L.polyline(state.current.route, { color: 'black', weight: 4, opacity: 1, lineJoin: 'round' }).addTo(state.layers.tempo);
    }
}

document.getElementById('startWalk').onclick = () => {
    state.current = { id: new Date().toLocaleString(), route: [], entries: [] };
    Object.values(state.layers).forEach(l => l.clearLayers());
    saveToDisk();
    alert("Walk gestartet.");
};

document.getElementById('stopWalk').onclick = () => {
    if (!state.current) return;
    state.walks.push(state.current);
    state.current = null;
    saveToDisk();
    updateArchiveUI();
    alert("Walk archiviert.");
};

function drawMarker(e) {
    const loc = [e.location.lat, e.location.lng];
    const iconHtml = e.type === 'photo' ? '📸' : '🎙️';
    const layer = e.type === 'photo' ? state.layers.photo : state.layers.audio;
    
    if (e.type === 'photo' || e.type === 'audio') {
        const icon = L.divIcon({ html: `<div style="font-size:24px;">${iconHtml}</div>`, className: 'custom-div-icon', iconSize:[30,30] });
        const m = L.marker(loc, {icon}).addTo(layer);
        if (e.photo) m.bindPopup(`<img src="${e.photo}" width="150">`);
        if (e.audioUrl) m.bindPopup(`<audio controls src="${e.audioUrl}"></audio>`);
    }
}

document.getElementById('exportFull').onclick = async () => {
    const walk = state.current || (state.walks.length > 0 ? state.walks[state.walks.length - 1] : null);
    if (!walk) return alert("Kein Walk vorhanden.");

    const loader = document.getElementById('exportLoader');
    const progress = document.getElementById('exportProgress');
    loader.style.display = 'flex';

    try {
        const zip = new JSZip();
        
        // 1. Karte & Route erfassen
        progress.innerText = "Erfasse Route und Karte...";
        await new Promise(r => setTimeout(r, 1200)); // Längerer Delay für GPS-Linie
        const canvas = await html2canvas(document.getElementById('map'), { 
            useCORS: true, 
            logging: false, 
            allowTaint: false,
            backgroundColor: '#ffffff'
        });
        zip.file("karte.jpg", canvas.toDataURL("image/jpeg", 0.8).split(',')[1], {base64: true});

        // 2. Medien sequentiell packen
        const mediaFolder = zip.folder("media");
        for (let i = 0; i < walk.entries.length; i++) {
            const e = walk.entries[i];
            progress.innerText = `Packe Medien ${i+1}/${walk.entries.length}...`;
            
            if (e.photo && e.photo.includes('base64')) {
                zip.file(`media/foto_${i}.jpg`, e.photo.split(',')[1], {base64: true});
            }
            if (e.audioUrl && e.audioUrl.includes('base64')) {
                zip.file(`media/audio_${i}.webm`, e.audioUrl.split(',')[1], {base64: true});
            }
            await new Promise(r => setTimeout(r, 40)); 
        }

        // 3. Routendaten als Text (Sicherheit)
        const routeData = walk.route.map(p => p.join(',')).join('\n');
        zip.file("route_koordinaten.txt", `Zeitstempel: ${walk.id}\n\nGPS-Punkte (Lat,Lng):\n${routeData}`);

        // 4. ZIP Download
        progress.innerText = "ZIP wird erstellt...";
        const content = await zip.generateAsync({type:"blob"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(content);
        link.download = `Walk_Route_${walk.id.replace(/[^a-z0-9]/gi, '_')}.zip`;
        link.click();

    } catch (err) {
        console.error(err);
        alert("Export fehlgeschlagen. Versuche es mit weniger Fotos oder schließe andere Apps.");
    } finally {
        loader.style.display = 'none';
    }
};

function updateArchiveUI() {
    const list = document.getElementById('walkList');
    list.innerHTML = "";
    state.walks.forEach(w => {
        const div = document.createElement('div');
        div.className = "walk-item";
        div.innerText = "Tour " + w.id;
        div.onclick = () => {
            Object.values(state.layers).forEach(l => l.clearLayers());
            state.current = w; renderRoute(); w.entries.forEach(drawMarker); state.current = null;
        };
        list.appendChild(div);
    });
}

function addEntry(type, data = {}) {
    if (!state.current) return alert("Starte erst einen Walk!");
    const pos = liveMarker.getLatLng();
    const entry = { type, location: { lat: pos.lat, lng: pos.lng }, timestamp: new Date().toLocaleString(), ...data };
    state.current.entries.push(entry);
    drawMarker(entry);
    saveToDisk();
}

document.getElementById('photoBtn').onclick = () => {
    const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
    input.onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => addEntry('photo', { photo: ev.target.result });
        reader.readAsDataURL(e.target.files[0]);
    };
    input.click();
};

document.getElementById('audioToggle').onclick = async () => {
    if (state.isRecording) {
        state.recorder.stop();
        state.isRecording = false;
        document.getElementById('audioToggle').innerText = "▶️";
    } else {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        state.recorder = new MediaRecorder(stream);
        let chunks = [];
        state.recorder.ondataavailable = e => chunks.push(e.data);
        state.recorder.onstop = () => {
            const reader = new FileReader();
            reader.onload = () => addEntry('audio', { audioUrl: reader.result });
            reader.readAsDataURL(new Blob(chunks));
        };
        state.recorder.start();
        state.isRecording = true;
        document.getElementById('audioToggle').innerText = "⏹️";
    }
};

initMap();
</script>
</body>
</html>

<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
    <title>Begleitinstrument — Aktives Archiv</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        html, body, #map { height: 100%; margin: 0; background: #fff; overflow: hidden; }
        #map { width: 100%; height: 100vh; }
        .top-ui { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; gap: 8px; }
        .side-ui { position: fixed; top: 70px; right: 12px; z-index: 1000; width: 180px; display: flex; flex-direction: column; gap: 10px; }
        .bottom-left { position: fixed; bottom: 20px; left: 12px; z-index: 1000; display: flex; flex-direction: column; gap: 12px; }
        .panel { background: white; padding: 12px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: 1px solid #ddd; }
        .btn { padding: 10px 14px; border-radius: 10px; font-weight: bold; font-size: 11px; cursor: pointer; text-transform: uppercase; border: none; }
        .fab { width: 60px; height: 60px; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border: none; box-shadow: 0 6px 12px rgba(0,0,0,0.2); }
        
        /* Archiv Styling */
        .walk-item { padding: 8px; border-bottom: 1px solid #eee; font-size: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-radius: 6px; margin-bottom: 4px; transition: 0.2s; }
        .walk-item:hover { background: #f0f4ff; }
        .active-walk { background: #2563eb !important; color: white; font-weight: bold; box-shadow: 0 2px 5px rgba(37, 99, 235, 0.3); }
        .delete-btn { color: #ff4d4d; padding: 2px 6px; font-weight: bold; font-size: 14px; }
        
        .custom-div-icon { background: none; border: none; }
        .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; color: white; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-family: sans-serif; }
    </style>
</head>
<body>

<div id="exportLoader" class="loading-overlay">
    <div class="text-xl font-bold mb-2">Export läuft...</div>
    <div id="exportProgress" class="text-sm opacity-80 px-10 text-center">Bitte nicht das Fenster schließen. <br>Wir sichern Karte, GPS-Route und Medien.</div>
</div>

<div id="map"></div>

<div class="top-ui">
    <button id="startWalk" class="btn bg-blue-600 text-white shadow-lg">NEUER WALK</button>
    <button id="stopWalk" class="btn bg-red-600 text-white">BEENDEN</button>
    <button id="exportFull" class="btn bg-black text-white">ZIP EXPORT</button>
</div>

<div class="side-ui">
    <div class="panel">
        <p class="font-bold text-[9px] uppercase text-gray-400 mb-2 border-b">Ebenen</p>
        <div class="flex items-center gap-2 mb-1 text-xs"><input id="toggleTempo" type="checkbox" checked> <label>Route</label></div>
        <div class="flex items-center gap-2 mb-1 text-xs"><input id="togglePhoto" type="checkbox" checked> <label>Fotos</label></div>
        <div class="flex items-center gap-2 mb-1 text-xs"><input id="toggleAudio" type="checkbox" checked> <label>Audio</label></div>
    </div>
    <div class="panel max-h-[250px] overflow-y-auto">
        <p class="font-bold text-[9px] uppercase text-gray-400 border-b mb-2">Archiv</p>
        <div id="walkStatus" class="text-[8px] text-blue-600 font-bold mb-2 uppercase">Modus: Live-Tracking</div>
        <div id="walkList"></div>
    </div>
</div>

<div class="bottom-left">
    <button id="photoBtn" class="fab bg-white">📸</button>
    <button id="audioToggle" class="fab bg-orange-400 text-white">▶️</button>
    <button id="senseBtn" class="fab bg-[#3d633d] text-white">👁️</button>
    <button id="thoughtBtn" class="fab bg-[#12345f] text-white">💭</button>
    <button id="moodBtn" class="fab" style="background: radial-gradient(circle, #ff8c00, #ff4500);">🔋</button>
</div>

<script>
const state = {
    walks: JSON.parse(localStorage.getItem('savedWalks') || '[]'),
    current: JSON.parse(localStorage.getItem('currentWalk') || 'null'),
    selectedIndex: null,
    map: null,
    isRecording: false,
    viewingArchive: false,
    layers: { tempo: L.layerGroup(), photo: L.layerGroup(), audio: L.layerGroup(), mood: L.layerGroup(), sense: L.layerGroup(), thought: L.layerGroup() }
};

let liveMarker = null;

function saveToDisk() {
    localStorage.setItem('currentWalk', JSON.stringify(state.current));
    localStorage.setItem('savedWalks', JSON.stringify(state.walks));
}

function initMap() {
    state.map = L.map('map', { zoomControl: false, preferCanvas: true }).setView([47.23, 9.61], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { crossOrigin: true }).addTo(state.map);
    Object.values(state.layers).forEach(l => l.addTo(state.map));
    
    if (state.current) { 
        renderRoute(state.current); 
        state.current.entries.forEach(e => drawMarker(e)); 
    }
    updateArchiveUI();

    navigator.geolocation.watchPosition(pos => {
        const { latitude, longitude } = pos.coords;
        if (!liveMarker) {
            liveMarker = L.circleMarker([latitude, longitude], { radius: 8, fillColor: "#2563eb", color: "#fff", weight: 2, fillOpacity: 1
